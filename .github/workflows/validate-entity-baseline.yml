name: Validate StegEntity Baseline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify activation manifest
        run: python tools/verify_activation_manifest.py

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Check repo activation
        run: python tools/check_repo_activation.py
