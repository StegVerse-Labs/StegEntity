name: StegEntity Verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build role context demo files
        run: python tools/build_role_context_demo.py

      - name: Verify generated role context demo files
        run: python tools/verify_generated_role_context_demo.py

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Check role context demo
        run: python tools/check_role_context_demo.py

      - name: Check repo activation
        run: python tools/check_repo_activation.py
